name: Release

on:
  push:
    tags: ['v*']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build-mac:
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS
        run: npx electron-vite build && npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          VITE_SUBSCRIPTION_KEY_WEBHOOK_URL: ${{ secrets.VITE_SUBSCRIPTION_KEY_WEBHOOK_URL }}
          VITE_SUBSCRIPTION_KEY_WEBHOOK_TOKEN: ${{ secrets.VITE_SUBSCRIPTION_KEY_WEBHOOK_TOKEN }}
          # To enable code signing + notarization, add these secrets and remove CSC_IDENTITY_AUTO_DISCOVERY:
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build
          path: dist/*.dmg
          retention-days: 1

  build-win:
    needs: [test]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows
        run: npx electron-vite build && npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          VITE_SUBSCRIPTION_KEY_WEBHOOK_URL: ${{ secrets.VITE_SUBSCRIPTION_KEY_WEBHOOK_URL }}
          VITE_SUBSCRIPTION_KEY_WEBHOOK_TOKEN: ${{ secrets.VITE_SUBSCRIPTION_KEY_WEBHOOK_TOKEN }}
          # To enable code signing, add these secrets and remove CSC_IDENTITY_AUTO_DISCOVERY:
          # CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe
          retention-days: 1

  release:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: mac-build
          path: artifacts/mac

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: artifacts/win

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/mac/*.dmg
            artifacts/win/*.exe
